[package]
name = "im-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[features]
default = ["small-chunks"]
small-chunks = ["pds/small-chunks"]

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

[dependencies.pds]
path = ".."
features = ["debug"]

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "hashmap"
path = "fuzz_targets/hashmap.rs"

[[bin]]
name = "hashset"
path = "fuzz_targets/hashset.rs"

[[bin]]
name = "ordmap"
path = "fuzz_targets/ordmap.rs"

[[bin]]
name = "ordset"
path = "fuzz_targets/ordset.rs"

[[bin]]
name = "vector"
path = "fuzz_targets/vector.rs"
